  <body>
    <form name="Login" method="post" action="#" id="Login">
      <table class="main_table">
        <tbody>
          <tr>
            <td>
              <div id="left_head"></div>
            </td>
          </tr>
          <tr>
            <td>
              <div id="" class="header_menu2">
                <a href="javascript:void(0);" class="menu_item_inactive">HOME</a
                ><a href="Login.html" class="menu_item_active">LOGIN</a>
              </div>
            </td>
          </tr>
          <tr>
            <td class="main_table_detail_content_loggedout" align="center">
              <table class="containerborder" id="otbMain">
                <tbody>
                  <tr>
                    <td align="center">
                      <table id="otbMessageTable" style="display: none">
                        <tbody>
                          <tr>
                            <td id="loginErrorText" class="ErrorMessageText">
                              Login error.
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <table>
                        <tbody>
                          <tr>
                            <td>
                              <div>
                                <img
                                  src="./assets/images/SBCA_Logo.png"
                                  width="100px"
                                  height="150px"
                                />
                              </div>
                            </td>
                            <td>
                              <table>
                                <tbody>
                                  <tr>
                                    <td class="login_text">USER ID</td>
                                    <td>
                                      <input
                                        name="otbUserID"
                                        type="text"
                                        maxlength="64"
                                        id="otbUserID"
                                        class="login_textbox"
                                      />
                                    </td>
                                  </tr>
                                  <tr>
                                    <td class="login_text">PASSWORD</td>
                                    <td>
                                      <input
                                        name="otbPassword"
                                        type="password"
                                        maxlength="32"
                                        id="otbPassword"
                                        class="login_textbox"
                                      />
                                    </td>
                                  </tr>
                                </tbody>
                              </table>
                            </td>
                          </tr>
                        </tbody>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td align="center">
                      <input
                        type="submit"
                        name="obtnLogin"
                        value="LOGIN"
                        id="obtnLogin"
                        class="buttonboxreg"
                        style="width: 225px"
                      />
                    </td>
                  </tr>
                  <tr>
                    <td align="right">
                      <div style="color: rgb(92, 91, 91); font-size: 10px">
                        RESET/ FORGOT PASSWORD?
                        <a href="Reset Password.html">CLICK HERE</a>
                      </div>
                    </td>
                  </tr>
                </tbody>
              </table>
            </td>
          </tr>
          <tr>
            <td>
              <div id="footer">
                &copy; 2022
                <a class="links" href="http://www.ledgea.com/"
                  >Ledgea Systems, Inc.</a
                >
                All rights reserved.
              </div>
            </td>
          </tr>
        </tbody>
      </table>
    </form>
    <script>
      const VALID_USERNAME = "2025300339";
      const VALID_PASSWORD = "lola31leo";
      const errorTable = document.getElementById("otbMessageTable");
      const errorText = document.getElementById("loginErrorText");

      function showLoginError(message) {
        errorText.textContent = message;
        errorTable.style.display = "";
      }

      document
        .getElementById("Login")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const username = document.getElementById("otbUserID").value.trim();
          const password = document.getElementById("otbPassword").value;
          errorTable.style.display = "none";

          if (username === "") {
            showLoginError("Login error.");
            return;
          }

          if (password === "") {
            showLoginError("The user ID or password is invalid.");
            return;
          }

          if (username === VALID_USERNAME && password === VALID_PASSWORD) {
            window.location.href = "Student Login Acknowledgement.html";
            return;
          }

          showLoginError("The user ID or password is invalid.");
        });
    </script>
  </body>
