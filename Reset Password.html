  <body>
    <form name="Reset" method="post" action="#" id="Reset">
      <table class="main_table">
        <tbody>

            <td>

            </td>
          </tr>
          <tr>
            <td>

              </div>
            </td>
          </tr>
          <tr>
            <td class="main_table_detail_content_loggedout" align="center">
              <table class="containerborder" id="otbMain">
                <tbody>
                  <tr>
                    <td align="center">
                      <table id="otbMessageTable" style="display: none">
                        <tbody>
                          <tr>
                            <td
                              id="otdTopMessage"
                              class="ErrorMessageText"
                            ></td>
                          </tr>
                        </tbody>
                      </table>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <p>
                        <strong>Enter the user to reset the password.</strong>
                      </p>
                    </td>
                  </tr>
                  <tr>
                    <td>
                      <table>
                        <tbody>
                          <tr>
                            <td>
                              <div>
                                <img
                                  src="./assets/images/SBCA_Logo.png"
                                  width="100px"
                                  height="150px"
                                />
                              </div>
                            </td>
                            <td>
                              <table>
                                <tbody>
                                  <tr>
                                    <td class="login_text">USER ID</td>
                                    <td>
                                      <input
                                        name="otbUserID"
                                        type="text"
                                        maxlength="64"
                                        id="otbUserID"
                                        class="login_textbox"
                                        style="width: 200px"
                                      />
                                    </td>
                                  </tr>
                                  <tr>
                                    <td colspan="2">
                                      <span
                                        id="oimageCaptcha"
                                        class="captcha-box"
                                      ></span>
                                      <br /><em class="notice"
                                        >Note: Reload the page to regenerate
                                        image if it is unreadable.</em
                                      >
                                    </td>
                                  </tr>
                                  <tr>
                                    <td colspan="2">
                                      <p>
                                        <strong
                                          >Enter the text shown above:</strong
                                        >
                                        <br />
                                        <input
                                          name="otbCaptchaText"
                                          type="text"
                                          maxlength="32"
                                          id="otbCaptchaText"
                                          class="login_textbox"
                                          style="width: 100px"
                                        />
                                        <input
                                          type="submit"
                                          name="obtnSubmitButton"
                                          value="Reset password and email me"
                                          id="obtnSubmitButton"
                                          class="buttonLogin"
                                        />
                                        <br />
                                      </p>
                                      <p>
                                        <span

    </form>
    <script>
      const VALID_USERNAME = "2025300339";
      const RESET_EMAIL_MASK =
        "20********@sanbeda-alabang.edu.ph, li*******@gmail.com";
      const CAPTCHA_POOL = ["YisM", "JFhg", "tstrvtvpd"];

      const form = document.getElementById("Reset");
      const userInput = document.getElementById("otbUserID");
      const captchaInput = document.getElementById("otbCaptchaText");
      const captchaVisual = document.getElementById("oimageCaptcha");
      const submitButton = document.getElementById("obtnSubmitButton");
      const inlineMessage = document.getElementById("olblMessage");
      const topMessageTable = document.getElementById("otbMessageTable");
      const topMessageCell = document.getElementById("otdTopMessage");

      let expectedCaptcha = "";

      function setCaptcha() {
        expectedCaptcha =
          CAPTCHA_POOL[Math.floor(Math.random() * CAPTCHA_POOL.length)];
        captchaVisual.textContent = expectedCaptcha;
      }

      function clearMessages() {
        inlineMessage.textContent = "";
        topMessageTable.style.display = "none";
        topMessageCell.innerHTML = "";
      }

      function setInlineMessage(message) {
        inlineMessage.textContent = message;
      }

      function showSuccessState() {
        const successText =
          "Your password reset was emailed to " + RESET_EMAIL_MASK;
        topMessageCell.innerHTML =
          successText +
          '<br>Please follow the instructions in the email and proceed to the <a href="index.html" target="_self">login page</a>.';
        topMessageTable.style.display = "";
        setInlineMessage(successText);

        userInput.readOnly = true;
        captchaInput.readOnly = true;
        submitButton.disabled = true;
      }

      setCaptcha();

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        clearMessages();

        const username = userInput.value.trim();
        const enteredCaptcha = captchaInput.value.trim();

        if (username !== VALID_USERNAME) {
          setInlineMessage("User is invalid for reset.");
          return;
        }

        if (enteredCaptcha.toLowerCase() !== expectedCaptcha.toLowerCase()) {
          setInlineMessage("Captcha text is incorrect, please try again.");
          return;
        }

        showSuccessState();
      });
    </script>
