<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <meta name="bingbot" content="noindex, nofollow, noarchive, nosnippet, noimageindex" />
  <title>iEnroll Login</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body data-page="login">
  <div class="site-frame login-page">
    <header class="login-top-banner">
      <img class="header-logo" src="https://ienroll.sanbeda-alabang.edu.ph/SERP/Images/SBCA_Logo.png" alt="San Beda College Alabang logo" />
      <h1>San Beda College Alabang</h1>
    </header>

    <nav class="login-nav">
      <span>HOME</span>
      <span>LOGIN</span>
    </nav>

    <main class="login-main-stage">
      <section class="auth-box" aria-label="Login panel">
        <img class="auth-logo" src="https://ienroll.sanbeda-alabang.edu.ph/SERP/Images/SBCA_Logo.png" alt="School crest" />

        <form id="loginForm" class="login-form" novalidate>
          <div class="field-row">
            <label for="username">USER ID</label>
            <input id="username" name="username" type="text" autocomplete="username" required />
          </div>

          <div class="field-row">
            <label for="password">PASSWORD</label>
            <input id="password" name="password" type="password" autocomplete="current-password" required />
          </div>

          <button type="submit" class="login-btn">LOGIN</button>
          <p class="reset-note">RESET/ FORGOT PASSWORD? <a href="reset.html">CLICK HERE</a></p>
          <p id="loginError" class="error" aria-live="polite"></p>
        </form>
      </section>
    </main>

    <footer class="login-footer">
      &copy; 2022 Ledgea Systems, Inc. All rights reserved.
    </footer>
  </div>

  <script src="script.js"></script>
</body>
</html>
